# Beispiel-Setup: DMS Backup GUI neben einem bestehenden docker-mailserver.
# Pfade an die eigene Umgebung anpassen (Unraid: /mnt/user/appdata/...).
services:
  dms-backup-gui:
    image: ghcr.io/apulanto-ai/dms-backup-gui:latest
    # Alternativ lokal bauen:
    # build: .
    container_name: dms-backup-gui
    restart: unless-stopped
    # Die GUI lauscht im Container auf Port 80. Erhält der Container eine eigene
    # IP (z. B. Unraid-Bridge br0 / macvlan), ist kein Port-Mapping nötig.
    ports:
      - "8080:80"
    environment:
      # --- Sicherheit ---
      ADMIN_PASSWORD: "bitte-aendern"

      # --- DMS-Container-Steuerung (optional, für sicheren Restore) ---
      DMS_CONTAINER: "mailserver"

      # --- Webmail (IMAP/SMTP des DMS) ---
      IMAP_HOST: "mailserver"        # Hostname/IP des DMS
      IMAP_PORT: "993"
      IMAP_SECURE: "true"
      SMTP_HOST: "mailserver"
      SMTP_PORT: "465"
      SMTP_SECURE: "true"
      # Bei selbstsignierten Zertifikaten:
      # TLS_REJECT_UNAUTHORIZED: "false"

      # --- Automatische Backups (per GUI änderbar) ---
      BACKUP_CRON: "0 3 * * *"
      RETENTION: "14"
    volumes:
      # Backup-Ziel (hier liegen auch die GUI-Einstellungen)
      - ./backups:/backups
      # DMS-Daten einmal als Ganzes mounten – welche Unterordner gesichert
      # werden, wird bequem im ⚙️-Konfigurationsdialog der GUI festgelegt.
      # (Unraid: /mnt/user/appdata/dms o. ä.)
      - ./docker-data/dms:/dms
      # Docker-Socket nur nötig, wenn der DMS-Container beim Restore
      # automatisch gestoppt/gestartet werden soll
      - /var/run/docker.sock:/var/run/docker.sock
